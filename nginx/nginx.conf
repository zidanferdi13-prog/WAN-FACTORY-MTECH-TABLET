# =============================================================================
# AMA Timbangan Aditif — nginx reverse proxy config
#
# Responsibilities:
#   - Serve React SPA static files directly (fast, no Node.js involved)
#   - Proxy /api/*       → Node.js backend (app:3000)
#   - Proxy /socket.io/* → Node.js backend with WebSocket upgrade
# =============================================================================

upstream backend {
    server app:3000;
    keepalive 32;
}

server {
    listen 80;
    server_name _;

    root  /usr/share/nginx/html;
    index index.html;

    # ── Compression ────────────────────────────────────────────────────────────
    gzip            on;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_proxied    any;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # ── Static asset caching ───────────────────────────────────────────────────
    # Vite hashes filenames → safe to cache forever
    location ~* \.(js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico|webp)$ {
        expires    1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── API proxy ──────────────────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # ── Socket.IO (WebSocket + polling fallback) ───────────────────────────────
    location /socket.io/ {
        proxy_pass         http://backend;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        # Keep WebSocket connections alive (24 h)
        proxy_read_timeout  86400s;
        proxy_send_timeout  86400s;
    }

    # ── React SPA fallback ─────────────────────────────────────────────────────
    # All other paths → index.html so React Router handles client-side routing
    location / {
        try_files $uri $uri/ /index.html;
    }
}
