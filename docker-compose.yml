# =============================================================================
# AMA Timbangan Aditif — Docker Compose
#
# Services
#   nginx  — nginx reverse proxy, serves React SPA, proxies API + Socket.IO
#   app    — Node.js backend (API + WebSocket only, not exposed to host)
#   mysql  — MySQL 8.0 database (auto-initialised from schema.sql)
#
# Quick start
#   1. cp .env.example .env          # edit passwords + serial port paths
#   2. docker compose up --build -d
#   3. Open http://localhost
#
# ⚠  WINDOWS SERIAL PORT NOTE ──────────────────────────────────────────────
#   Docker Desktop on Windows uses a WSL2 (Linux) backend.  COM ports are
#   NOT automatically passed through to Linux containers.
#
#   Options:
#     A) usbipd-win  — attach a USB–serial adapter via USB/IP then map as
#                      /dev/ttyUSBx inside the container.
#     B) socat bridge — inside WSL2: socat PTY,link=/dev/ttyS0 TCP:host:port
#     C) Windows Containers — switch Docker Desktop to "Windows containers"
#                             mode (requires different base image, more work).
#
#   To enable serial pass-through once the device is visible as a Linux path,
#   uncomment the `devices:` block under the `app` service below.
# =============================================================================

services:

  # ── nginx reverse proxy ─────────────────────────────────────────────────────
  nginx:
    build:
      context: .
      dockerfile: Dockerfile
      target: nginx-server
    image: ama-nginx:latest
    container_name: ama-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    networks:
      - ama-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/api/status || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ── MySQL 8.0 ───────────────────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: ama-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME:-amanerve_loadcell}
      MYSQL_USER: ${DB_USER:-amauser}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    ports:
      # Expose only on localhost — remove this line in production if external
      # DB access is not needed.
      - "127.0.0.1:3306:3306"
    volumes:
      # Persistent database data
      - mysql-data:/var/lib/mysql
      # Auto-initialise schema on first run (only runs when data volume is empty)
      - ./backend/database_schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "--silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - ama-net

# ── Named volumes ─────────────────────────────────────────────────────────────
volumes:
  mysql-data:
    driver: local

# ── Networks ──────────────────────────────────────────────────────────────────
networks:
  ama-net:
    driver: bridge
